<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - NextStep Care</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Light Sky Theme with White Glass */
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            margin: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .splash-container {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; color: #1e3c72; text-align: center; padding: 20px;
        }
        .splash-logo {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px; border-radius: 50%; width: 160px; height: 160px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(30, 60, 114, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            animation: float 3s ease-in-out infinite;
        }
        .splash-logo img { max-width: 90%; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .splash-text h1 { 
            font-size: 3rem; margin-bottom: 10px; font-weight: 700; 
            color: #1e3c72;
            text-shadow: 0 2px 10px rgba(255,255,255,0.5);
        }
        .splash-text p { font-size: 1.2rem; color: #475569; margin-bottom: 30px; font-weight: 400; }
        
        .loader { 
            border: 3px solid rgba(30, 60, 114, 0.1); border-top: 3px solid #1e3c72; 
            border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .get-started-btn { 
            display: inline-block; margin-top: 25px; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: #ffffff; 
            padding: 14px 40px; text-decoration: none; border-radius: 30px; font-weight: 700; 
            font-size: 1.1rem; transition: all 0.3s; box-shadow: 0 4px 15px rgba(30, 60, 114, 0.2); 
        }
        .get-started-btn:hover { 
            transform: translateY(-3px); box-shadow: 0 8px 25px rgba(30, 60, 114, 0.3); background: #1e3c72; 
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="splash-logo">
            <img src="logo.png" alt="NextStep Care Logo">
        </div>
        <div class="splash-text">
            <h1>NextStep Care</h1>
            <p>Smart Recovery. Stronger Tomorrow.</p>
        </div>
        <div class="loader"></div>
        <a href="login.html" class="get-started-btn">Get Started Now <i class="fas fa-arrow-right" style="margin-left: 8px;"></i></a>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 5000);
    </script>
</body>
</html>
