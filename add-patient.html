<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient - NextStep Care</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Light Sky & Glass Theme Overrides */
        body { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; padding-bottom: 40px; }
        
        .navbar { background: rgba(255, 255, 255, 0.6) !important; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.8) !important; box-shadow: 0 4px 20px rgba(30, 60, 114, 0.05); margin-bottom: 30px;}
        .nav-brand { color: #1e3c72 !important; font-weight: 700; }
        
        .form-container {
            background: rgba(255, 255, 255, 0.65) !important; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8) !important; box-shadow: 0 15px 35px rgba(30, 60, 114, 0.08) !important; border-radius: 24px !important;
            max-width: 900px; margin: 0 auto; padding: 40px;
        }
        
        h2, h3 { color: #1e3c72 !important; }
        label { color: #334155 !important; font-weight: 600; margin-bottom: 8px; display: block; }
        
        input, select { 
            background: rgba(255, 255, 255, 0.9) !important; border: 1px solid rgba(30, 60, 114, 0.15) !important; 
            color: #1e293b !important; border-radius: 12px !important; padding: 14px !important; width: 100%; box-sizing: border-box;
        }
        input:focus, select:focus { border-color: #38bdf8 !important; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2) !important; outline: none; }
        select option { background: white; color: #1e293b; }
        
        .medicine-entry { 
            background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.8); 
            padding: 20px; border-radius: 16px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center;
        }
        .medicine-entry input { flex: 1; min-width: 150px; }
        
        button { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%) !important; color: white !important; border: none !important; border-radius: 12px !important; box-shadow: 0 4px 15px rgba(30, 60, 114, 0.2) !important; font-weight: 700; font-size: 16px; padding: 15px 25px; cursor: pointer; transition: all 0.3s;}
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(30, 60, 114, 0.3) !important; }
        
        button.remove-medicine { background: linear-gradient(135deg, #e11d48 0%, #be123c 100%) !important; padding: 14px 20px; flex: none; box-shadow: 0 4px 15px rgba(225, 29, 72, 0.2) !important;}
        button#addMedicine { background: rgba(255, 255, 255, 0.8) !important; color: #1e3c72 !important; border: 1px dashed #1e3c72 !important; box-shadow: none !important; width: 100%; margin-bottom: 30px;}
        button#addMedicine:hover { background: #f0f8ff !important; }
        
        .back-btn { background: rgba(255, 255, 255, 0.8) !important; color: #1e3c72 !important; border: 1px solid #1e3c72 !important; padding: 8px 15px !important; border-radius: 10px !important; text-decoration: none; font-weight: 600; box-shadow: none !important; }
        .back-btn:hover { background: #1e3c72 !important; color: white !important; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
         <img src="logo.png" alt="Company Logo" style="max-width:25%; height:25%; margin-right: 10px;"> NextStep Care
        </div>
        <div class="nav-user" style="display: flex; align-items: center; gap: 15px;">
            <span id="doctorName" style="font-weight: 600; color: #1e293b;">Dr. Aman</span>
            <a href="doctor-dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 style="margin-bottom: 30px; font-size: 2rem;"><i class="fas fa-user-plus" style="color: #38bdf8;"></i> Add New Patient</h2>
            <form id="addPatientForm">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Patient Name</label>
                        <input type="text" id="patientName" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <label>Patient ID</label>
                        <input type="text" id="patientId" placeholder="e.g. PAT011" required>
                    </div>
                    <div class="input-group">
                        <label>Age</label>
                        <input type="number" id="age" placeholder="Years" required>
                    </div>
                    <div class="input-group">
                        <label>Gender</label>
                        <select id="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Primary Disease</label>
                        <select id="primaryDisease" required>
                            <option value="">Select Diagnosis</option>
                            <option value="diabetes">Diabetes</option>
                            <option value="hypertension">Hypertension</option>
                            <option value="cardiac">Cardiac Issues</option>
                            <option value="c-section">C-Section</option>
                            <option value="anemia">Anemia</option>
                            <option value="asthma">Asthma</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Current BP</label>
                        <input type="text" id="currentBP" placeholder="e.g. 120/80">
                    </div>
                    <div class="input-group">
                        <label>Blood Sugar</label>
                        <input type="number" id="bloodSugar" placeholder="mg/dL">
                    </div>
                    <div class="input-group">
                        <label>Hemoglobin</label>
                        <input type="number" id="hemoglobin" step="0.1" placeholder="g/dL">
                    </div>
                </div>

                <h3 style="margin: 30px 0 15px 0; border-top: 1px solid rgba(255,255,255,0.5); padding-top: 20px;"><i class="fas fa-pills" style="color: #38bdf8;"></i> Initial Prescriptions</h3>
                <div id="medicineSchedule">
                    <div class="medicine-entry">
                        <input type="text" placeholder="Medicine Name" class="medicine-name" required>
                        <input type="text" placeholder="Dosage (e.g., 500mg)" class="medicine-dosage" required>
                        <input type="time" class="medicine-time" required>
                        <button type="button" class="remove-medicine"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
                <button type="button" id="addMedicine"><i class="fas fa-plus"></i> Add Another Medicine</button>

                <div class="form-grid">
                    <div class="input-group">
                        <label>Next Appointment Date</label>
                        <input type="date" id="nextAppointment" required>
                    </div>
                    <div class="input-group">
                        <label>Initial Health Status</label>
                        <select id="healthStatus" required>
                            <option value="stable">Stable (Green)</option>
                            <option value="moderate">Moderate (Yellow)</option>
                            <option value="critical">Critical (Red)</option>
                        </select>
                    </div>
                </div>

                <button type="submit" style="width: 100%; margin-top: 20px; font-size: 1.1rem;"><i class="fas fa-save"></i> Save Patient Record</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
